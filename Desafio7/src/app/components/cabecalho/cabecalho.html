<header class="home-header" *ngIf="!menuAberto"> 

  <div class="logo-area">
    <img src="img/icon-menu.svg" alt="Ford Logo" class="icon-menu" (click)="openMenu()">
  </div>    
  <div class="logout-area">
    <button class="btn-logout" (click)="executarLogout()">
      <img src="img/icon-logout.svg" alt="Finalizar sessão">
    </button>
  </div>

</header>

  <aside>
      <div class="side-bar" *ngIf="menuAberto">
        <div class="images">
            <img src="img/ford.png" alt="">
            <img src="img/icon-close.svg" alt="Ford Logo" class="icon-menu" (click)="closeMenu()">
        </div>
        <p class="back-home" routerLink="/home">Home</p>
        <p routerLink="/dashboard">Dashboard</p>
      </div>
  </aside>
