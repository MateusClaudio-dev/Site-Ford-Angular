<div class="login-container">
        <div class="login-card">       
        <div class="login-image-section">
            <img src="img/ranger.png" alt="Veículo da Ford" class="car-image">
        </div>
        <div class="login-form-section">
            <div class="brand-logo">
                <img src="img/ford.png" alt="Ford Logo" class="logo">
            </div>
            <h2>Boas-vindas</h2>
            <form (ngSubmit)="aoSubmeterLogin()">
                <div class="input-group">
                    <input 
                    type="text"
                    name="nome"
                    placeholder="Insira seu usuário (admin)"
                    [(ngModel)]="dadosForm.nome"
                    required
                    >
                </div>
                <div class="input-group">
                    <input 
                    type="password"
                    name="senha"
                    placeholder="Insira sua senha"
                    [(ngModel)]="dadosForm.senha"
                    required
                    >
                </div>
                <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" name="autoLogin">
                            <span class="checkmark"></span>
                            Logar automaticamente
                    </label>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
        </div>
    </div>
</div>
